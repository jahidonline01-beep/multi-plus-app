name: Build Lite Plus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build project structure
        run: |
          mkdir -p app/src/main/java/com/liteplus/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets/www

          cp app-build.gradle         app/build.gradle
          cp AndroidManifest.xml      app/src/main/AndroidManifest.xml
          cp MainActivity.java        app/src/main/java/com/liteplus/app/MainActivity.java
          cp ProxyVpnService.java    app/src/main/java/com/liteplus/app/ProxyVpnService.java
          cp inject.js                app/src/main/assets/inject.js
          cp index.html               app/src/main/assets/www/index.html
          cp activity_main.xml        app/src/main/res/layout/activity_main.xml
          cp colors.xml               app/src/main/res/values/colors.xml
          cp strings.xml              app/src/main/res/values/strings.xml
          cp themes.xml               app/src/main/res/values/themes.xml
          cp network_security_config.xml app/src/main/res/xml/network_security_config.xml

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp ic_launcher.png app/src/main/res/mipmap-${density}/ic_launcher.png
          done

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LitePlus-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
